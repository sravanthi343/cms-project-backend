spring.application.name=complaint-management-system
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:file:./data/cmsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT — change the secret in production!
jwt.secret=cms-jwt-secret-key-college-management-2024-SECURE-LONG-KEY
jwt.expiration=86400000
